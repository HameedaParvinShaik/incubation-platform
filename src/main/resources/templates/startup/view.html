<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Startup - Startup Incubation Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .navbar {
            margin-bottom: 20px;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            border-radius: 12px 12px 0 0;
        }
        .badge {
            font-size: 0.85rem;
            padding: 6px 14px;
        }
        .detail-label {
            font-weight: 600;
            color: #475569;
        }
        .detail-value {
            font-weight: 500;
        }
        .bg-warning { color: #1a1a2e; }
        @media (max-width: 768px) {
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-rocket me-2"></i>Startup Incubator
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/startups"><i class="fas fa-building"></i> Startups</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/mentors"><i class="fas fa-users"></i> Mentors</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/auth/logout">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 th:text="${startup.name}">Startup Name</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>Category:</strong> <span th:text="${startup.category} ?: 'N/A'"></span></p>
                        <p><strong>Status:</strong>
    <span th:if="${startup.status == null}" class="badge bg-secondary">NULL</span>
    <span th:unless="${startup.status == null}" th:switch="${startup.status}">
        <span th:case="'PENDING'" class="badge bg-warning">PENDING</span>
        <span th:case="'APPROVED'" class="badge bg-success">APPROVED</span>
        <span th:case="'ACTIVE'" class="badge bg-primary">ACTIVE</span>
        <span th:case="'COMPLETED'" class="badge bg-info">COMPLETED</span>
        <span th:case="'REJECTED'" class="badge bg-danger">REJECTED</span>
        <span th:case="'INACTIVE'" class="badge bg-secondary">INACTIVE</span>
        <span th:case="*" class="badge bg-secondary" th:text="${startup.status}">UNKNOWN</span>
    </span>
</p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Team Size:</strong> <span th:text="${startup.teamSize} ?: 1"></span></p>
                        <p><strong>Website:</strong> <a th:href="${startup.website}" target="_blank" th:text="${startup.website} ?: 'N/A'"></a></p>
                    </div>
                </div>
                <div class="mt-3">
                    <p><strong>Description:</strong></p>
                    <p th:text="${startup.description} ?: 'No description provided.'"></p>
                </div>
                <div class="mt-3">
                    <p><strong>Created:</strong> <span th:text="${#temporals.format(startup.createdAt, 'dd MMM yyyy HH:mm')}"></span></p>
                    <p><strong>Approved:</strong> <span th:text="${startup.isApproved} ? 'Yes' : 'No'"></span></p>
                </div>
            </div>
            <div class="card-footer">
                <a href="/startups" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Back to List
                </a>
                <a th:href="@{/startups/{id}/edit(id=${startup.id})}" class="btn btn-warning">
                    <i class="fas fa-edit me-2"></i>Edit
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
