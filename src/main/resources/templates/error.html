<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Startup Incubator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-danger text-white text-center">
                        <h4><i class="fas fa-exclamation-triangle"></i> Oops! Something Went Wrong</h4>
                    </div>
                    <div class="card-body text-center">
                        <h1 class="display-1 text-danger">!</h1>
                        <p class="lead" th:text="${error} ?: 'An unexpected error occurred'">An unexpected error occurred</p>
                        <p th:text="${message} ?: 'Please try again or contact support'">Please try again or contact support</p>
                        <a href="/dashboard" class="btn btn-primary mt-3">
                            <i class="fas fa-home"></i> Go to Dashboard
                        </a>
                        <a href="/auth/login" class="btn btn-outline-secondary mt-3">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
