<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Funding Request - Manager Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar and Topbar (same as list.html) -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <h2>Edit Funding Request</h2>
                <form th:action="@{/manager/funding/{id}/edit(id=${fundingRequest.id})}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Purpose</label>
                        <input type="text" class="form-control" name="purpose" th:value="${fundingRequest.purpose}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" name="notes" rows="4" th:text="${fundingRequest.notes}"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a href="/manager/funding" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
