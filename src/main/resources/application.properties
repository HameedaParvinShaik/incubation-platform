# =============================================
# APPLICATION CONFIGURATION
# =============================================
spring.application.name=incubation-platform
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false
server.error.path=/error

# =============================================
# DATABASE CONFIGURATION (MySQL 8)
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}



# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=IncubationHikariPool

# =============================================
# JPA / HIBERNATE CONFIGURATION
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================
# SQL INITIALIZATION - DISABLED (Users saved permanently)
# =============================================
spring.sql.init.mode=never

# =============================================
# THYMELEAF CONFIGURATION
# =============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.check-template-location=true

# =============================================
# SPRING SECURITY CONFIGURATION
# =============================================
spring.session.timeout=3600

# =============================================
# FILE UPLOAD CONFIGURATION
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2MB
#spring.servlet.multipart.location=/tmp/uploads

# =============================================
# EMAIL CONFIGURATION
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hameedaparvins@gmail.com
spring.mail.password=pervin
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =============================================
# ACTUATOR / MONITORING
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.diskspace.enabled=true

# =============================================
# LOGGING
# =============================================
logging.level.com.startupincubator=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/incubation-platform.log
logging.file.max-size=10MB
logging.file.max-history=7

# =============================================
# CUSTOM PROPERTIES
# =============================================
app.upload.dir=uploads/
app.upload.temp-dir=uploads/temp/
app.upload.documents-dir=uploads/documents/
app.upload.profile-pictures-dir=uploads/profiles/

app.email.from=noreply@startupincubator.com
app.email.support=support@startupincubator.com

app.startup.status.default=PENDING
app.startup.max-team-members=10

app.pagination.default-page=0
app.pagination.default-size=10

app.security.bcrypt.strength=12

app.jwt.secret=incubationPlatformJwtSecretKey2024Secure
app.jwt.expiration-ms=86400000

# =============================================
# SPRING DOCUMENTATION (Swagger/OpenAPI)
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.startupincubator.controller

# =============================================
# INTERNATIONALIZATION
# =============================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600

# =============================================
# STATIC RESOURCES
# =============================================
spring.web.resources.static-locations=classpath:/static/,classpath:/public/
spring.web.resources.cache.period=31536000
spring.web.resources.chain.cache=true
spring.mvc.static-path-pattern=/static/**
# Ignore favicon and static resource warnings
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true

