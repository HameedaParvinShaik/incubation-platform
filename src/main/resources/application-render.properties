# src/main/resources/application-render.properties

# =============================================
# RENDER DEPLOYMENT CONFIGURATION
# =============================================
spring.application.name=incubation-platform
server.port=${PORT:8080}
server.servlet.context-path=/
server.error.whitelabel.enabled=false

# =============================================
# DATABASE CONFIGURATION - Render PostgreSQL
# =============================================
# Render provides these as environment variables
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE - PostgreSQL
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================
# SQL INITIALIZATION
# =============================================
spring.sql.init.mode=never

# =============================================
# THYMELEAF - Production
# =============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.check-template-location=true

# =============================================
# SPRING SECURITY
# =============================================
spring.session.timeout=3600
server.servlet.session.cookie.secure=true

# =============================================
# FILE UPLOAD
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.location=/tmp/uploads

# =============================================
# EMAIL - Production
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =============================================
# ACTUATOR / MONITORING
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.diskspace.enabled=true

# =============================================
# LOGGING - Production
# =============================================
logging.level.com.startupincubator=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =============================================
# CUSTOM PROPERTIES
# =============================================
app.upload.dir=/tmp/uploads/
app.upload.temp-dir=/tmp/uploads/temp/
app.upload.documents-dir=/tmp/uploads/documents/
app.upload.profile-pictures-dir=/tmp/uploads/profiles/

app.email.from=noreply@startupincubator.com
app.email.support=support@startupincubator.com

app.startup.status.default=PENDING
app.startup.max-team-members=10

app.pagination.default-page=0
app.pagination.default-size=10

app.security.bcrypt.strength=12
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# =============================================
# SPRING DOCUMENTATION
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.startupincubator.controller

# =============================================
# STATIC RESOURCES
# =============================================
spring.web.resources.static-locations=classpath:/static/,classpath:/public/
spring.web.resources.cache.period=31536000
spring.web.resources.chain.cache=true
spring.mvc.static-path-pattern=/static/**
spring.web.resources.add-mappings=true