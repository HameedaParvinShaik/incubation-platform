# render.yaml
services:
  - type: web
    name: startup-incubator
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Dspring.profiles.active=prod -jar target/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: startup-db
          property: connectionString
      - key: JDBC_DATABASE_USERNAME
        fromDatabase:
          name: startup-db
          property: user
      - key: JDBC_DATABASE_PASSWORD
        fromDatabase:
          name: startup-db
          property: password
      - key: ADMIN_PASSWORD
        generateValue: true
    healthCheckPath: /login
    autoDeploy: true

  - type: postgresql
    name: startup-db
    databaseName: incubator_db
    user: incubator_user
    plan: free